    <style>
        /* 字体优化：优先加载系统圆体字族 */
        body { 
            background-color: #F8FDFF; 
            /* 极浅灰色网格背景 */
            background-image: 
                linear-gradient(rgba(226, 232, 240, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(226, 232, 240, 0.3) 1px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Yuanti SC', 'STZhongsong', 'Microsoft YaHei', 'SimHei', sans-serif; 
            overflow: hidden; 
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
            /* 移动端优化 */
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            /* iOS Safe Area 适配 */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        /* 修复移动端 100vh 问题 */
        .h-screen-fix { height: 100vh; height: calc(var(--vh, 1vh) * 100); }
        .font-cartoon { 
            font-family: 'Yuanti SC', 'STZhongsong', 'Microsoft YaHei', cursive; 
            font-weight: 900;
        }
        
        .mesh-gradient { 
            background: radial-gradient(at 0% 0%, rgba(204, 251, 241, 0.9) 0, transparent 50%), 
                        radial-gradient(at 100% 0%, rgba(224, 247, 250, 0.9) 0, transparent 50%), 
                        #f0fdfa; 
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
        .animate-shake { animation: shake 0.2s ease-in-out 2; }
        
        @keyframes bounce-subtle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .animate-bounce-subtle { animation: bounce-subtle 4s infinite ease-in-out; }

        /* MG动画定义 */
        @keyframes mg-float {
            0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
            33% { transform: translateY(-10px) rotate(5deg) scale(1.05); }
            66% { transform: translateY(5px) rotate(-5deg) scale(0.95); }
        }
        .animate-mg { animation: mg-float 6s infinite ease-in-out; }
        
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.1); opacity: 0.6; }
        }
        .animate-pulse-soft { animation: pulse-soft 4s infinite ease-in-out; }

        .transition-all { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .lucide { width: 1.5rem; height: 1.5rem; stroke-width: 2.5px; }

        /* 卡通 Dock 栏样式 */
        .cartoon-dock {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 4px solid #fff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06), inset 0 0 20px rgba(255,255,255,0.5);
            border-radius: 9999px;
        }

        .bubble-btn {
            box-shadow: 0 8px 0 rgba(0,0,0,0.04);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .bubble-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 rgba(0,0,0,0.04);
        }

        .gradient-text {
            background: linear-gradient(135deg, #4f46e5, #9333ea, #db2777);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* SVG 动画增强 */
        .svg-float { animation: bounce-subtle 5s infinite ease-in-out; }
        .svg-float-delayed { animation: bounce-subtle 6s infinite ease-in-out 1.5s; }
        .svg-sway { animation: sway 4s infinite ease-in-out; }
        @keyframes sway { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
    </style>
</head>

                        <!-- Guide Icon with MG Animation - Background -->
                        <div class="absolute bottom-6 right-6 opacity-[0.05] animate-mg pointer-events-none">
                            <i data-lucide="sparkles" class="w-24 h-24 md:w-32 md:h-32 text-indigo-500"></i>
                        </div>
                        
                        <!-- Quiz Header - Floating Pill -->
                        <div class="bg-gradient-to-r from-indigo-500 via-purple-600 to-pink-500 p-2 md:p-4 text-white flex justify-between items-center rounded-full shadow-2xl mx-3 mt-3 md:mx-6 md:mt-5 flex-shrink-0 border-4 border-white/30 relative z-10">
                            <button onclick="setSubject(null)" class="w-8 h-8 md:w-11 md:h-11 flex items-center justify-center hover:bg-white/20 rounded-full transition-all active:scale-90">
                                <i data-lucide="chevron-left" class="w-4 h-4 md:w-6 md:h-6"></i>
                            </button>
                            <div class="text-center">
                                <span class="text-[9px] md:text-sm font-black opacity-95 uppercase tracking-[0.2em] md:tracking-[0.3em] font-cartoon">${state.subject} 大冒险</span>
                                <div class="flex gap-1 md:gap-1.5 mt-1 md:mt-2">
                                    ${Array.from({length:10}).map((_, i) => `
                                        <div class="h-1 w-2.5 md:w-6 rounded-full ${i < state.qCount ? 'bg-amber-300 shadow-[0_0_8px_rgba(252,211,77,0.8)]' : 'bg-white/20'} transition-all duration-700"></div>
                                    `).join('')}
                                </div>
                            </div>
                            <div class="text-[8px] md:text-xs font-black bg-white/20 px-2.5 py-1 rounded-full border border-white/20">${state.qCount}/10</div>
                        </div>

                        <!-- Quiz Content -->
                        <div class="flex-1 p-3 md:p-6 pb-4 md:pb-8 flex flex-col items-center justify-start min-h-0 overflow-y-auto scrollbar-hide relative z-10">
                            <div class="bg-white w-full p-3 md:p-5 rounded-[1.5rem] md:rounded-[2.5rem] mb-3 md:mb-5 text-center border-4 border-indigo-50 shadow-sm relative overflow-visible flex-shrink-0">
                                <div class="absolute -top-2.5 -left-2.5 w-8 h-8 md:w-11 md:h-11 bg-amber-400 rounded-xl flex items-center justify-center shadow-lg rotate-[-15deg] border-4 border-white">
                                    <i data-lucide="lightbulb" class="text-white w-4 h-4 md:w-6 md:h-6"></i>
                                </div>
                                <h3 class="text-sm md:text-xl font-cartoon text-slate-800 leading-relaxed tracking-wide">${state.currentQuestion.question}</h3>
                            </div>
                            
                            <div class="grid grid-cols-1 gap-2 md:gap-3.5 w-full max-w-xl flex-shrink-0">
                                ${state.currentQuestion.options.map(opt => {
                                    const isAnswer = opt === state.currentQuestion.answer;
                                    const isUserPick = opt === state.selectedOption;
                                    let cls = "bg-white border-2 md:border-4 border-slate-50 text-slate-700 hover:border-indigo-100 hover:bg-indigo-50/40";
                                    if (state.showExplanation) {
                                        if (isAnswer) cls = "bg-emerald-50 border-emerald-300 text-emerald-600 ring-2 md:ring-4 ring-emerald-50";
                                        else if (isUserPick) cls = "bg-rose-50 border-rose-300 text-rose-500 animate-shake";
                                        else cls = "opacity-40 scale-95 shadow-none";
                                    }
                                    return `
                                        <button onclick="handleOption(this.getAttribute('data-opt'))" data-opt="${opt.replace(/"/g, '&quot;')}" ${state.showExplanation ? 'disabled' : ''} class="bubble-btn p-2.5 md:p-3.5 rounded-full font-cartoon text-xs md:text-lg transition-all flex justify-between items-center ${cls}">
                                            <span class="pl-4 md:pl-7">${opt}</span>
                                            <div class="pr-2 md:pr-3">
                                                ${state.showExplanation && isAnswer ? '<i data-lucide="check-circle-2" class="text-emerald-500 w-4 h-4 md:w-7 md:h-7"></i>' : (state.showExplanation && isUserPick ? '<i data-lucide="x-circle" class="text-rose-400 w-4 h-4 md:w-7 md:h-7"></i>' : '')}
                                            </div>
                                        </button>
                                    `;
                                }).join('')}
                            </div>

                            <!-- Explanation Box - Cute Bubble -->
                            ${state.showExplanation ? `
                                <div class="mt-3 md:mt-4 p-3 md:p-4 bg-white/95 border-2 md:border-4 border-indigo-100 text-slate-800 rounded-[1.5rem] md:rounded-[2rem] w-full max-w-xl flex flex-col md:flex-row items-center justify-between shadow-xl gap-2 md:gap-4 animate-in slide-in-from-bottom-3 duration-700 flex-shrink-0 relative">
                                    <div class="flex items-center gap-3 flex-1 min-w-0">
                                        <div class="bg-amber-100 p-1.5 rounded-xl text-amber-600 shadow-md rotate-12 flex-shrink-0 border-2 border-white">
                                            <i data-lucide="sparkles" class="w-4 h-4 md:w-6 md:h-6"></i>
                                        </div>
                                        <div class="min-w-0 text-left">
                                            <p class="text-[7px] md:text-[9px] font-black uppercase text-amber-500 mb-0.5 tracking-[0.1em] font-cartoon">智慧锦囊</p>
                                            <p class="font-bold text-[9px] md:text-sm italic text-slate-600 leading-tight">${state.currentQuestion.explanation}</p>
                                        </div>
                                    </div>
                                    <button onclick="nextQuestion()" class="bg-gradient-to-r from-indigo-500 to-blue-500 px-5 md:px-7 py-2 md:py-3 rounded-full font-cartoon text-[10px] md:text-base text-white hover:scale-110 active:scale-90 shadow-lg whitespace-nowrap flex items-center gap-1.5 md:gap-2 transition-all flex-shrink-0 border-2 md:border-4 border-white/20">
                                        ${state.selectedOption === state.currentQuestion.answer ? '下一题' : '再试一次'} <i data-lucide="arrow-right" class="w-3.5 h-3.5 md:w-5 md:h-5"></i>
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }
            // 每次渲染后重新生成图标
            if (window.lucide) lucide.createIcons();
        }

        // --- 交互函数 ---
        window.updateInteractionMsg = (type) => {
            const msgs = INTERACTIVE_TEXTS[type];
            state.interactionMsg = msgs[Math.floor(Math.random() * msgs.length)];
        };

        window.setGrade = (g) => { 
            state.grade = g; 
            if (g) updateInteractionMsg('start');
            render(); 
        };
        
        window.setSubject = (s) => { state.subject = s; render(); };
        
        window.startSubject = (s) => {
            state.subject = s;
            state.qCount = 1;
            state.score = 0;
            state.askedQuestions = []; // 重置本轮题目记录
            state.currentQuestion = generateQuestion();
            state.askedQuestions.push(state.currentQuestion.question); // 记录第一题
            state.showExplanation = false;
            state.selectedOption = null;
            state.interactionMsg = "挑战开始，看你的咯！🚀";
            addMsg(`开启【${state.grade}${s}】闯关！期待你的表现哦！💪`);
            render();
        };

        window.handleOption = (opt) => {
            state.selectedOption = opt;
            state.showExplanation = true;
            if (opt === state.currentQuestion.answer) {
                state.score += 10;
                updateInteractionMsg('correct');
                if (window.confetti) window.confetti({ particleCount: 50, spread: 60, origin: { y: 0.7 } });
                addMsg(`太牛了！完全正确！积分 +10 🎊`);
            } else {
                updateInteractionMsg('wrong');
                addMsg(`没关系，看下解析，下次一定能对！加油！`);
            }
            render();
        };

        window.nextQuestion = () => {
            if (state.selectedOption !== state.currentQuestion.answer) {
                state.showExplanation = false;
                state.selectedOption = null;
                state.interactionMsg = "再挑战一次，一定行！✨";
            } else if (state.qCount >= 10) {
                state.interactionMsg = "大获全胜！你是智慧星！🏆";
                addMsg(`本轮挑战完成！总得分：${state.score} 🏆`);
                state.subject = null;
            } else {
                state.qCount++;
                // 根据题目进度更新互动文字
                if (state.qCount === 5) updateInteractionMsg('middle');
                else if (state.qCount === 9) updateInteractionMsg('nearEnd');
                else state.interactionMsg = `第 ${state.qCount} 题，继续加油！`;
                
                state.currentQuestion = generateQuestion();
                state.askedQuestions.push(state.currentQuestion.question); // 记录新出的题目
                state.showExplanation = false;
                state.selectedOption = null;
            }
            render();
        };

        function generateQuestion() {
            const gLevel = GRADES.indexOf(state.grade) + 1;
            
            if (state.subject === '数学') {
                let q, a, e;
                // 对于数学，即使是随机生成的，也防止在同一轮出现一模一样的算式
                let attempts = 0;
                do {
                    if (gLevel <= 2) {
                        const n1 = Math.floor(Math.random() * 50) + 1;
                        const n2 = Math.floor(Math.random() * 50) + 1;
                        const isAdd = Math.random() > 0.5;
                        q = isAdd ? `${n1} + ${n2} = ?` : `${Math.max(n1, n2)} - ${Math.min(n1, n2)} = ?`;
                        a = isAdd ? n1 + n2 : Math.max(n1, n2) - Math.min(n1, n2);
                        e = `口算技巧：把数字拆开算，比如 ${n1}+${n2} 等于 ${a}。`;
                    } else if (gLevel <= 4) {
                        const n1 = Math.floor(Math.random() * 20) + 2;
                        const n2 = Math.floor(Math.random() * 12) + 2;
                        const isMul = Math.random() > 0.4;
                        if (isMul) {
                            q = `${n1} × ${n2} = ?`; a = n1 * n2;
                            e = `乘法计算：${n1}乘以${n2}等于${a}。`;
                        } else {
                            const res = n1 * n2;
                            q = `${res} ÷ ${n2} = ?`; a = n1;
                            e = `除法是乘法的逆运算：因为 ${n1}×${n2}=${res}，所以 ${res}÷${n2}=${n1}。`;
                        }
                    } else {
                        // 高年级增加分数/简易方程概念
                        const type = Math.random();
                        if (type < 0.4) {
                            const n1 = Math.floor(Math.random() * 100) + 20;
                            const n2 = Math.floor(Math.random() * 15) + 3;
                            q = `${n1} ÷ ${n2} 的余数是？`; a = n1 % n2;
                            e = `余数计算：${n1}除以${n2}，余数是${a}。`;
                        } else if (type < 0.7) {
                            const x = Math.floor(Math.random() * 20) + 5;
                            const b = Math.floor(Math.random() * 30) + 10;
                            const res = x + b;
                            q = `如果 x + ${b} = ${res}，那么 x = ?`; a = x;
                            e = `解方程：x = ${res} - ${b} = ${x}。`;
                        } else {
                            const x = Math.floor(Math.random() * 10) + 2;
                            const y = Math.floor(Math.random() * 5) + 1;
                            q = `2x - ${y} = ${2*x-y}，x = ?`; a = x;
                            e = `先移项：2x = ${2*x-y} + ${y} = ${2*x}，再除以2得 x = ${x}。`;
                        }
                    }
                    attempts++;
                } while (state.askedQuestions.includes(q) && attempts < 20);

                const ansStr = String(a);
                const options = new Set([ansStr]);
                while(options.size < 3) {
                    const offset = Math.floor(Math.random() * 10) + 1;
                    const val = a + (Math.random() > 0.5 ? offset : -offset);
                    if (val >= 0) options.add(String(val));
                }
                return {
                    question: q,
                    options: Array.from(options).sort(() => Math.random() - 0.5),
                    answer: ansStr,
                    explanation: e
                };
            }

            const subjectPool = QUESTION_BANK[state.subject] || QUESTION_BANK['语文'];
            
            // 严格按年级段筛选，确保低年级和高年级题目完全隔离
            let pool;
            if (gLevel <= 2) {
                // 1-2年级
                pool = subjectPool.filter(item => item.g.some(g => g <= 2));
            } else if (gLevel <= 4) {
                // 3-4年级
                pool = subjectPool.filter(item => item.g.some(g => g >= 3 && g <= 4));
            } else {
                // 5-6年级
                pool = subjectPool.filter(item => item.g.some(g => g >= 5));
            }

            // 如果该年级段题目不足（防御性），则向上或向下寻找最接近的题目，但绝不跨越低/高年级鸿沟
            if (pool.length === 0) {
                pool = subjectPool; // 最后的保底
            }

            // 过滤掉本轮已经出现过的题目
            let availablePool = pool.filter(item => !state.askedQuestions.includes(item.q));
            
            // 如果可用题目库为空（本轮题目已出完），则重置记录
            if (availablePool.length === 0) {
                state.askedQuestions = [];
                availablePool = pool;
            }

            const picked = availablePool[Math.floor(Math.random() * availablePool.length)];
            
            // 确保答案一定在选项中（防御性编程）
            const finalOptions = picked.o.includes(picked.a) ? picked.o : [...picked.o, picked.a].slice(0, 3);

            return {
                question: picked.q,
                options: [...finalOptions].sort(() => Math.random() - 0.5),
                answer: picked.a,
                explanation: picked.e
            };
        }

        function addMsg(text, sender = 'ai') {
            const chat = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} animate-in ${sender === 'user' ? 'slide-in-from-right-2' : 'slide-in-from-left-2'}`;
            
            if (sender === 'user') {
                div.innerHTML = `<div class="p-4 rounded-[1.5rem] text-sm font-bold bg-gradient-to-r from-indigo-600 to-blue-500 text-white rounded-tr-none shadow-lg leading-relaxed max-w-[85%]">${text}</div>`;
            } else {
                div.innerHTML = `<div class="p-4 rounded-[1.5rem] text-sm font-bold bg-white text-slate-700 rounded-tl-none border border-teal-50 shadow-md leading-relaxed max-w-[85%]">${text}</div>`;
            }
            
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        async function getAiResponse(text) {
            const input = text.toLowerCase();
            
            // 简单数学计算识别
            if (/\d+[\+\-\*\/]\d+/.test(input)) {
                try {
                    const result = eval(input.match(/\d+[\+\-\*\/]\d+/)[0]);
                    return `我算出来啦！结果是 ${result}。数学真有趣，对吧？🔢`;
                } catch(e) {}
            }

            if (input.includes("数学")) return "数学是宇宙的语言！掌握了加减乘除，你就能解开世界的秘密。📐 想做道数学题吗？";
            if (input.includes("语文") || input.includes("诗")) return "古诗词里藏着绝美的风景。比如“大漠孤烟直”，多有画面感呀！📖 你最喜欢哪首诗？";
            if (input.includes("英语") || input.includes("单词")) return "English is a window to the world! 我们可以从简单的单词开始练习。想知道“天才”怎么说吗？是 Genius 哦！🔤";
            if (input.includes("你是谁") || input.includes("名字")) return "我是你的 AI 助学精灵！你可以叫我“小灵”，我会一直在这里陪你学习闯关。🧚‍♂️";
            if (input.includes("地理")) return "从珠穆朗玛峰到马里亚纳海沟，地球真的太奇妙了！🌍 你想了解哪里？";
            if (input.includes("历史")) return "历史记录了人类的成长。想听听三国演义里诸葛亮的故事吗？那是智慧的化身！🏹";
            if (input.includes("太难") || input.includes("不会")) return "别灰心！爱迪生发明电灯还失败了上千次呢。每一次错误都是进步的机会！💪";
            if (input.includes("你好") || input.includes("哈喽")) return "你好呀！聪明的勇士！今天我们要征服哪个知识领地？✨";
            
            const randomEncouragement = [
                "你说得真有道理！我们要保持好奇心。🚀",
                "哇，你的想法很有趣！继续加油！💡",
                "我一直在听哦，让我们一起变得更强吧！🌊",
                "学习是一场奇妙的旅行，我会一直陪着你。🔍",
                "只要每天进步一点点，你就是最棒的！🌟"
            ];
            return randomEncouragement[Math.floor(Math.random() * randomEncouragement.length)];
        }

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            
            // 添加用户消息
            addMsg(text, 'user');
            input.value = '';
            
            // 添加“思考中”状态
            const loadingDiv = addMsg('<span class="inline-flex gap-2"><span class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce"></span><span class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce [animation-delay:0.2s]"></span><span class="w-2 h-2 bg-indigo-400 rounded-full animate-bounce [animation-delay:0.4s]"></span></span>');
            
            const response = await getAiResponse(text);
            
            setTimeout(() => {
                loadingDiv.remove();
                addMsg(response);
            }, 800 + Math.random() * 1000);
        };

        // 初始化渲染
        window.addEventListener('resize', () => {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        });
        window.dispatchEvent(new Event('resize'));
        render();
    </script>
</body>
</html>
